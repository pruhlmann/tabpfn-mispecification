[project]
name = "tabpfn-misspecification"
channels = ["conda-forge", "pytorch"]
channel-priority = "disabled"
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.14"
pytorch = "~=2.6.0"
pytorch-cuda = "12.4"
numpy = "*"
matplotlib = "*"
scikit-learn = "<1.6"
scipy = "<1.13"

[pypi-dependencies]
tabpfn-misspec = { path = ".", editable = true }
npe-pfn = { path = "../npe-pfn", editable = true }
sbibm = "*"
sbi = "*"
pot = "*"
ml-collections = "*"
absl-py = "*"

[tasks]
experiment = "python scripts/run_experiment.py"
experiment-debug = "python scripts/run_experiment.py --config configs/debug.py"
sweep = "python scripts/run_calibration_sweep.py"
sweep-debug = "python scripts/run_calibration_sweep.py --config configs/debug.py"
plot = "python scripts/plot_sweep.py"
